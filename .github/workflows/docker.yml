name: Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          file: Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/devsoc-unsw/mc-auth:${{ github.sha }}
            ghcr.io/devsoc-unsw/mc-auth:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    concurrency: production
    environment: production
    steps:
      - name: Dispatch deployment
        uses: devsoc-unsw/deployment-dispatch-action@main
        with:
          deployment-dispatcher-app-id: ${{ vars.DEPLOYMENT_DISPATCHER_APP_ID }}
          deployment-dispatcher-app-private-key: ${{ secrets.DEPLOYMENT_DISPATCHER_APP_PRIVATE_KEY }}
          updates: |
            ghcr.io/devsoc-unsw/mc-auth=${{ github.sha }}

